# Movers sources -- auto-discover high-activity names each morning
# Valid: $SPX, $DJI, $COMPX, NASDAQ, NYSE, EQUITY_ALL
movers_sources:
  - symbol: "$SPX"
    sort: "volume"         # top volume movers in S&P 500
    limit: 15
  - symbol: "NASDAQ"
    sort: "percent_up"     # biggest gainers on Nasdaq
    limit: 10

# Scoring weights (tune these to change selection behavior)
scoring:
  # Relative volume vs 10-day avg (0-3 points)
  rel_volume_weight: 3.0
  # Absolute daily volume in millions (0-2 points)
  abs_volume_weight: 2.0
  # Proximity to 52-week extremes (0-2 points)
  range_position_weight: 2.0
  # Price move magnitude today (0-2 points)
  daily_move_weight: 2.0
  # Mover bonus: appeared in top movers list (0-1 points)
  mover_bonus: 1.0

# Thresholds
thresholds:
  # Minimum score to be selected for scraping
  min_score: 4.0
  # Maximum number of individual names to scrape per cycle
  max_names: 8
  # Minimum average 10-day volume (shares) to be considered
  min_avg_volume: 1000000
  # Must be optionable
  require_optionable: true
