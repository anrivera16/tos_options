# ---------------------------------------------------------------------------
# Movers sources -- auto-discover high-activity names each morning
# Valid: $SPX, $DJI, $COMPX, NASDAQ, NYSE, EQUITY_ALL
# ---------------------------------------------------------------------------
movers_sources:
  - symbol: "$SPX"
    sort: "volume"
    limit: 15
  - symbol: "NASDAQ"
    sort: "percent_up"
    limit: 10

# ---------------------------------------------------------------------------
# Scoring weights (universe scanner)
# ---------------------------------------------------------------------------
scoring:
  rel_volume_weight: 3.0
  abs_volume_weight: 2.0
  range_position_weight: 2.0
  daily_move_weight: 2.0
  mover_bonus: 1.0

# ---------------------------------------------------------------------------
# Thresholds
# ---------------------------------------------------------------------------
thresholds:
  min_score: 4.0
  max_names: 8
  min_avg_volume: 1000000
  require_optionable: true
