# Universe Watchlist Configuration
#
# Static watchlist of stocks to evaluate daily for options trading.
# These are pre-filtered for: optionable, liquid, and relevant to the
# user's trading style (credit spreads on high-IV names).

# Always-index tickers (scraped every cycle regardless of score)
indexes:
  - $SPX
  - SPY
  - QQQ

# Tier 1: High-conviction names -- always evaluated, likely scraped
# if they score well.  These are the "usual suspects" with liquid
# option chains and frequent IV opportunities.
tier1:
  # MAG7
  - AAPL
  - AMZN
  - GOOG
  - GOOGL
  - META
  - MSFT
  - NVDA
  - TSLA

  # High-beta / high-IV tech
  - AMD
  - NFLX
  - CRM
  - UBER
  - PLTR
  - COIN
  - MSTR

