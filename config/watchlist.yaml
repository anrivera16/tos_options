# Sector-Bucket Watchlist Configuration
#
# Core tickers are ALWAYS scraped every cycle -- guarantees continuous
# data for baseline building (mispricing, IV tracking, earnings patterns).
# Dynamic tickers are added by the universe scanner and come/go freely.
#
# Each core ticker has a sector label for cross-sector analysis.

# ---------------------------------------------------------------------------
# Core Watchlist (NEVER dropped -- 24 tickers across 8 sectors)
# Based on: liquidity_analysis.md, correlation_analysis.md, iv_analysis.md
# ---------------------------------------------------------------------------

core:
  # Market Indexes (3) -- baseline, market gamma regime reference
  indexes:
    - symbol: $SPX
      sector: indexes
      iv_tier: sell      # Typically high IV, premium selling target
    - symbol: SPY
      sector: indexes
      iv_tier: buy       # Often cheapest IV, good for hedging/buying
    - symbol: QQQ
      sector: indexes
      iv_tier: neutral

  # Mega-Cap Tech (5) -- market drivers, tightest spreads
  mega_cap_tech:
    - symbol: AAPL
      sector: mega_cap_tech
      iv_tier: buy       # IV rank 34, often cheap
    - symbol: MSFT
      sector: mega_cap_tech
      iv_tier: neutral   # IV rank 41, fairly priced
    - symbol: GOOGL
      sector: mega_cap_tech
      iv_tier: neutral
    - symbol: META
      sector: mega_cap_tech
      iv_tier: sell      # High IV, good premium selling
    - symbol: AMZN
      sector: mega_cap_tech
      iv_tier: neutral

  # Semiconductors (6) -- merged original + extended (corr analysis)
  semiconductors:
    - symbol: NVDA
      sector: semiconductors
      iv_tier: sell      # High IV, strong earnings moves
    - symbol: AMD
      sector: semiconductors
      iv_tier: sell      # High IV rank, good selling
    - symbol: AVGO
      sector: semiconductors
      iv_tier: neutral
    - symbol: QCOM
      sector: semiconductors
      iv_tier: neutral
    - symbol: MU
      sector: semiconductors
      iv_tier: sell      # Memory cycle, IV spikes
    - symbol: INTC
      sector: semiconductors
      iv_tier: sell      # IV rank 58, restructuring

  # Fintech/Crypto (4) -- highest IV in market, BTC-correlated
  fintech_crypto:
    - symbol: MSTR
      sector: fintech_crypto
      iv_tier: sell      # IV 82%, rank 72, biggest crush
    - symbol: COIN
      sector: fintech_crypto
      iv_tier: sell      # IV 68%, rank 65
    - symbol: HOOD
      sector: fintech_crypto
      iv_tier: sell      # IV 58%, rank 58
    - symbol: MARA
      sector: fintech_crypto
      iv_tier: sell      # IV 77%, rank 68, biggest crush

  # Consumer/Retail (3) -- earnings sensitive, retail-driven
  consumer_retail:
    - symbol: TSLA
      sector: consumer_retail
      iv_tier: sell      # High IV, huge earnings moves
    - symbol: UBER
      sector: consumer_retail
      iv_tier: neutral
    - symbol: LULU
      sector: consumer_retail
      iv_tier: sell      # High IV rank, earnings sensitive

  # Healthcare/Biotech (3) -- catalyst-driven, best diversifier
  healthcare:
    - symbol: TMO
      sector: healthcare
      iv_tier: buy       # IV rank 28 (lowest), cheapest IV
    - symbol: VRTX
      sector: healthcare
      iv_tier: buy       # IV rank 32, often cheap
    - symbol: LLY
      sector: healthcare
      iv_tier: neutral   # GLP-1 narrative, high liquidity

  # Industrials/Energy (3) -- sector rotation, macro signals
  industrials_energy:
    - symbol: GE
      sector: industrials_energy
      iv_tier: sell      # IV rank 55, above avg
    - symbol: CAT
      sector: industrials_energy
      iv_tier: buy       # IV rank 42, buys on economic cycle
    - symbol: XOM
      sector: industrials_energy
      iv_tier: buy       # IV rank 38, cheapest energy name

  # Growth/Tech (3) -- high IV growth names
  growth_tech:
    - symbol: PLTR
      sector: growth_tech
      iv_tier: sell      # Retail-heavy, high IV
    - symbol: PANW
      sector: growth_tech
      iv_tier: neutral   # Cyber security, steady
    - symbol: SNOW
      sector: growth_tech
      iv_tier: neutral   # Declining liquidity, monitor

