version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tos_0dte_db
    environment:
      POSTGRES_DB: tos_0dte
      POSTGRES_USER: tos_user
      POSTGRES_PASSWORD: tos_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./z0dte/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tos_user -d tos_0dte"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
